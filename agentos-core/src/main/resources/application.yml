server:
  port: 9090

spring:
  threads:
    virtual:
      enabled: true
  application:
    name: agentos-core
  autoconfigure:
    exclude: dev.langchain4j.openai.spring.AutoConfig
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB
  datasource:
    url: jdbc:postgresql://localhost:5432/agentos
    username: agentos
    password: agentos123
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

agentos:
  upload:
    max-file-size: 10485760
    allowed-types: csv,xlsx,pdf
    max-preview-rows: 5
    max-rows-per-file: 5000

  knowledge:
    embedding-server-url: http://127.0.0.1:8081
    chunk:
      chunk-size: 512
      chunk-overlap: 64
      max-chunks-per-document: 1000

# LangChain4j OpenAI configuration (MLX local endpoint)
langchain4j:
  open-ai:
    chat-model:
      base-url: http://127.0.0.1:8080/v1
      api-key: not-needed
      model-name: mlx-community/Qwen2-7B-Instruct-4bit
      temperature: 0.7
      log-requests: true
      log-responses: true

